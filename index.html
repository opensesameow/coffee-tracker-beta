<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:#f5f5f3;}
    input,select,textarea,button{font-family:inherit;color:#1a1a1a;}
    html,body{overflow-x:hidden;width:100%;}
    .app{max-width:680px;margin:0 auto;padding:1.5rem 1rem;width:100%;}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem;}
    .header h1{font-size:22px;font-weight:500;}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.1rem;}
    .stat{background:#fff;border-radius:10px;padding:.8rem 1rem;border:0.5px solid #e5e5e3;}
    .stat-label{font-size:12px;color:#888;margin-bottom:2px;}
    .stat-value{font-size:22px;font-weight:500;}
    .tabs-main{display:flex;border:0.5px solid #d5d5d3;border-radius:8px;overflow:hidden;margin-bottom:1.1rem;width:fit-content;}
    .tab-main{padding:6px 18px;font-size:13px;cursor:pointer;background:transparent;border:none;color:#888;}
    .tab-main.active{background:#1a1a1a;color:#fff;}
    .add-btn{display:flex;align-items:center;gap:5px;font-size:13px;padding:7px 14px;border-radius:8px;border:0.5px solid #d5d5d3;background:transparent;cursor:pointer;font-weight:500;}
    .add-btn:hover{background:#f0f0ee;}
    .coffee-list{display:flex;flex-direction:column;gap:12px;}
    .ccard{background:#fff;border:0.5px solid #e5e5e3;border-radius:12px;overflow:visible;position:relative;}
    .ccard-inner{overflow:hidden;border-radius:12px;}
    .ccard-top{display:flex;min-height:150px;}
    .ccard-photo-wrap{width:40%;flex-shrink:0;border-right:0.5px solid #e5e5e3;overflow:hidden;display:flex;align-self:stretch;}
    .ccard-photo-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
    .ccard-photo-ph{width:100%;display:flex;align-items:center;justify-content:center;font-size:11px;text-align:center;padding:12px;line-height:1.6;color:#aaa;}
    .ccard-right{display:flex;flex-direction:column;flex:1;min-width:0;}
    .ccard-info{padding:.75rem 1rem;display:flex;flex-direction:column;gap:3px;flex:1;}
    .ccard-name-row{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
    .ccard-name{font-size:15px;font-weight:500;flex:1;min-width:0;word-break:break-word;}
    .ccard-sub{font-size:12px;color:#888;}
    .ccard-taste{font-size:12px;color:#888;margin-top:3px;line-height:1.4;}
    .ccard-badge-row{margin-top:6px;}
    .badge{font-size:11px;padding:2px 9px;border-radius:6px;font-weight:500;white-space:nowrap;display:inline-block;}
    .badge-resting{background:#FEF9EC;color:#854F0B;}
    .badge-ready{background:#EAF3DE;color:#3B6D11;}
    .badge-expired{background:#FCEBEB;color:#A32D2D;}
    .rest-bar{height:3px;background:#e5e5e3;border-radius:2px;overflow:hidden;margin:.4rem 0 0;}
    .rest-bar-fill{height:100%;border-radius:2px;}
    .card-top-actions{display:flex;gap:4px;margin-left:auto;flex-shrink:0;}
    .btn-icon{width:26px;height:26px;border-radius:6px;border:0.5px solid #d5d5d3;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#888;}
    .btn-icon:hover{background:#f0f0ee;}
    .btn-icon.danger:hover{background:#FCEBEB;color:#A32D2D;}
    .ccard-dates{display:grid;grid-template-columns:repeat(4,1fr);border-top:0.5px solid #e5e5e3;}
    .date-cell{padding:.45rem 1rem;}
    .date-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1px;}
    .date-val{font-size:12px;font-weight:500;}
    .ccard-brew-section{border-top:0.5px solid #e5e5e3;}
    .brew-toggle{width:100%;padding:6px 1rem;background:transparent;border:none;font-size:12px;color:#888;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
    .brew-toggle:hover{background:#f8f8f6;}
    .brew-body{padding:.75rem 1rem;border-top:0.5px solid #e5e5e3;}
    .brew-entry{border:0.5px solid #e5e5e3;border-radius:8px;padding:.65rem .9rem;margin-bottom:8px;max-width:100%;box-sizing:border-box;}
    .brew-entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .brew-meta-row{display:flex;flex-wrap:wrap;gap:0;margin-bottom:8px;border:0.5px solid #e5e5e3;border-radius:8px;overflow:hidden;}
    .brew-meta-item{flex:1;min-width:60px;padding:.45rem .75rem;border-right:0.5px solid #e5e5e3;font-size:11px;color:#888;}
    .brew-meta-item:last-child{border-right:none;}
    .brew-meta-item span{display:block;font-size:12px;color:#1a1a1a;font-weight:500;margin-top:1px;}
    .brew-notes{font-size:12px;color:#888;line-height:1.5;}
    .brew-add-btn{width:100%;padding:7px;border:0.5px dashed #d5d5d3;border-radius:8px;background:transparent;color:#888;font-size:12px;cursor:pointer;}
    .brew-add-btn:hover{background:#f0f0ee;}
    .brew-entry-actions{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:0.5px solid #e5e5e3;}
    .inline-modal{background:#f8f8f6;border-top:0.5px solid #e5e5e3;padding:1.1rem;}
    .modal-title{font-size:15px;font-weight:500;margin-bottom:.85rem;}
    .modal-tabs{display:flex;border:0.5px solid #d5d5d3;border-radius:8px;overflow:hidden;margin-bottom:.85rem;width:fit-content;}
    .modal-tab{padding:5px 16px;font-size:12px;cursor:pointer;background:transparent;border:none;color:#888;}
    .modal-tab.active{background:#1a1a1a;color:#fff;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    @media (max-width:480px){
      .form-grid{grid-template-columns:1fr;}
      .brew-meta-item{border-top:0.5px solid #e5e5e3;}
      .brew-meta-item:nth-child(-n+2){border-top:none;}
      .brew-form-grid{grid-template-columns:1fr 1fr;width:100%;max-width:100%;}
      .brew-form-grid .brew-full{grid-column:1/-1;}
      .dates-form-grid{grid-template-columns:1fr;}
      .dates-form-grid .dates-full{grid-column:1/-1;}
      .ccard-name{padding-right:0;}
      input[type="date"]{min-width:0;width:100%;font-size:13px;-webkit-appearance:none;appearance:none;}
      .card-top-actions{position:static;display:flex;justify-content:flex-end;margin-bottom:4px;}
      .ccard-taste{word-break:break-all;overflow-wrap:break-word;}
    }
    .ff{display:flex;flex-direction:column;gap:4px;min-width:0;}
    .ff.full{grid-column:1/-1;}
    .ff label{font-size:12px;color:#888;}
    .ff input,.ff select,.ff textarea{font-size:13px;padding:6px 9px;border-radius:8px;border:0.5px solid #d5d5d3;background:#fff;color:#1a1a1a;width:100%;min-width:0;max-width:100%;}
    .ff textarea{resize:vertical;min-height:58px;}
    .ff input[readonly]{background:#f0f0ee;}
    .ff .hint{font-size:11px;color:#aaa;}
    .photo-drop{border:0.5px dashed #d5d5d3;border-radius:8px;padding:.65rem;text-align:center;cursor:pointer;color:#888;font-size:12px;background:#fff;}
    .photo-drop:hover{background:#f0f0ee;}
    .photo-prev{width:100%;height:140px;object-fit:cover;border-radius:8px;margin-top:6px;display:block;}
    .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:.9rem;}
    .btn-primary{font-size:13px;padding:7px 16px;border-radius:8px;border:0.5px solid #d5d5d3;background:#1a1a1a;color:#fff;cursor:pointer;}
    .btn-cancel{font-size:13px;padding:7px 16px;border-radius:8px;border:0.5px solid #d5d5d3;background:transparent;cursor:pointer;}
    .cal-wrap{background:#fff;border:0.5px solid #e5e5e3;border-radius:12px;padding:1rem .75rem;overflow:hidden;}
    .cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:.85rem;}
    .cal-nav button{background:transparent;border:0.5px solid #d5d5d3;border-radius:8px;padding:4px 12px;cursor:pointer;font-size:13px;}
    .cal-nav button:hover{background:#f0f0ee;}
    .cal-month{font-size:15px;font-weight:500;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;width:100%;overflow:hidden;}
    .cal-dow{font-size:10px;color:#aaa;text-align:center;padding:3px 0;text-transform:uppercase;}
    .cal-day{min-height:64px;padding:3px;border-radius:4px;overflow:hidden;min-width:0;}
    .cal-day.has-events{background:#f8f8f6;}
    .cal-day.today{outline:1px solid #1a1a1a;}
    .cal-day-num{font-size:11px;font-weight:500;color:#aaa;margin-bottom:2px;}
    .cal-day.today .cal-day-num{color:#1a1a1a;}
    .cal-day.other-month .cal-day-num{color:#ddd;}
    .cal-strip{height:5px;border-radius:2px;margin-bottom:2px;width:100%;}
    .cal-dot-row{display:flex;align-items:center;gap:3px;margin-bottom:1px;}
    .cal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .cal-dot-label{font-size:9px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
    .cal-clickable{cursor:pointer;}
    .cal-clickable:hover{background:#f0f0ee !important;}
    .cal-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:.85rem;padding-top:.75rem;border-top:0.5px solid #e5e5e3;}
    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:8px 18px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
    .toast.show{opacity:1;}
    .loading{text-align:center;padding:2.5rem 0;color:#aaa;font-size:14px;}
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>Coffee Tracker</h1>
    <button class="add-btn" onclick="openAddForm('new')"><i class="ti ti-plus"></i> Add coffee</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-label">Total coffees</div><div class="stat-value" id="stat-total">—</div></div>
    <div class="stat"><div class="stat-label">Ready</div><div class="stat-value" id="stat-ready">—</div></div>
    <div class="stat"><div class="stat-label">Still resting</div><div class="stat-value" id="stat-resting">—</div></div>
  </div>
  <div class="tabs-main">
    <button class="tab-main active" onclick="switchMain('list',this)">List</button>
    <button class="tab-main" onclick="switchMain('calendar',this)">Calendar</button>
    <button class="tab-main" onclick="switchMain('archive',this)">Archive</button>
  </div>
  <div id="view-list"><div class="coffee-list" id="coffee-list"><div class="loading">Loading your coffees...</div></div></div>
  <div id="view-archive" style="display:none;"><div class="coffee-list" id="archive-list"></div></div>
  <div id="view-calendar" style="display:none;">
    <div class="cal-wrap">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">&#8592;</button>
        <span class="cal-month" id="cal-label"></span>
        <button onclick="changeMonth(1)">&#8594;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-legend" id="cal-legend"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div id="cal-popup"></div>
<script>
const SB_URL='https://nqlqvtjponqmanvlhkoq.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xbHF2dGpwb25xbWFudmxoa29xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDAwNTAsImV4cCI6MjA5NTk3NjA1MH0.rVjohQyka7l0wkQVANLAj6oymj1OFbu55Vxkh8RVUTw';
const HEADERS={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

async function dbGet(){const r=await fetch(SB_URL+'/rest/v1/coffees?order=created_at.desc',{headers:{...HEADERS,'Prefer':'return=representation'}});if(!r.ok)throw new Error(await r.text());return r.json();}
async function dbInsert(row){const r=await fetch(SB_URL+'/rest/v1/coffees',{method:'POST',headers:{...HEADERS,'Prefer':'return=representation'},body:JSON.stringify(row)});if(!r.ok)throw new Error(await r.text());return(await r.json())[0];}
async function dbUpdate(id,row){const r=await fetch(SB_URL+'/rest/v1/coffees?id=eq.'+id,{method:'PATCH',headers:{...HEADERS,'Prefer':'return=representation'},body:JSON.stringify(row)});if(!r.ok)throw new Error(await r.text());return(await r.json())[0];}
async function dbDelete(id){const r=await fetch(SB_URL+'/rest/v1/coffees?id=eq.'+id,{method:'DELETE',headers:HEADERS});if(!r.ok)throw new Error(await r.text());}

function fromDB(row){return{id:row.id,name:row.name||'',roaster:row.roaster||'',origin:row.origin||'',process:row.process||'',producer:row.producer||'',tasteNotes:row.taste_notes||'',roastDate:row.roast_date||'',restDays:row.rest_days?String(row.rest_days):'',readyDate:row.ready_date||'',openDate:row.open_date||'',bestby:row.best_by||'',photo:row.photo||null,brewLog:row.brew_log||[],archived:row.archived||false};}
function toDB(c){return{name:c.name||null,roaster:c.roaster||null,origin:c.origin||null,process:c.process||null,producer:c.producer||null,taste_notes:c.tasteNotes||null,roast_date:c.roastDate||null,rest_days:c.restDays?parseInt(c.restDays):null,ready_date:c.readyDate||null,open_date:c.openDate||null,best_by:c.bestby||null,photo:c.photo||null,brew_log:c.brewLog||[],archived:c.archived||false};}
const PALETTE=[{bg:'#EEF4FC',strip:'#85B7EB'},{bg:'#FEF9EC',strip:'#FAC775'},{bg:'#EAF3DE',strip:'#97C459'},{bg:'#FBEAF0',strip:'#ED93B1'},{bg:'#E1F5EE',strip:'#5DCAA5'},{bg:'#EEEDFE',strip:'#AFA9EC'},{bg:'#FAECE7',strip:'#F0997B'},{bg:'#F1EFE8',strip:'#B4B2A9'}];
const pal=i=>PALETTE[i%PALETTE.length];
let coffees=[],calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let openBrewIdx={},editingIdx=null,brewEditIdx=null,brewEditEntryIdx=null,photoDataUrl=null;

function today(){return new Date().toISOString().split('T')[0];}
function addDays(ds,n){if(!ds||n==='')return '';const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()+parseInt(n));return d.toISOString().split('T')[0];}
function fmtShort(d){if(!d)return'—';return new Date(d+'T12:00:00').toLocaleDateString('en-SG',{day:'numeric',month:'short'});}
function fmtFull(d){if(!d)return'—';return new Date(d+'T12:00:00').toLocaleDateString('en-SG',{day:'numeric',month:'short',year:'numeric'});}
function getStatus(c){const t=today();if(c.bestby&&t>c.bestby)return'expired';if(c.readyDate&&t>=c.readyDate)return'ready';if(c.readyDate&&t<c.readyDate)return'resting';return'ready';}
function restProg(c){if(!c.roastDate||!c.restDays)return 100;const done=Math.round((new Date(today()+'T12:00:00')-new Date(c.roastDate+'T12:00:00'))/86400000);return Math.min(100,Math.max(0,Math.round(done/parseInt(c.restDays)*100)));}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}

function switchMain(tab,btn){
  document.querySelectorAll('.tab-main').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
  document.getElementById('view-list').style.display=tab==='list'?'':'none';
  document.getElementById('view-calendar').style.display=tab==='calendar'?'':'none';
  document.getElementById('view-archive').style.display=tab==='archive'?'':'none';
  if(tab==='calendar')renderCalendar();
  if(tab==='archive')renderArchive();
}
function renderStats(){
  const active=coffees.filter(c=>!c.archived);
  const s=active.map(getStatus);
  document.getElementById('stat-total').textContent=active.length;
  document.getElementById('stat-ready').textContent=s.filter(x=>x==='ready').length;
  document.getElementById('stat-resting').textContent=s.filter(x=>x==='resting').length;
}
function renderList(){
  const el=document.getElementById('coffee-list');
  let html='';
  if(editingIdx==='new')html=`<div class="ccard"><div class="inline-modal">${editFormHtml({})}</div></div>`;
  const active=coffees.filter(c=>!c.archived);
  if(!active.length){el.innerHTML=html+'<div style="text-align:center;padding:2.5rem 0;color:#aaa;font-size:14px;">No coffees yet — add your first bag!</div>';return;}
  html+=active.map((c,i)=>cardHtml(c,coffees.indexOf(c))).join('');
  el.innerHTML=html;
}
function renderArchive(){
  const el=document.getElementById('archive-list');
  const archived=coffees.filter(c=>c.archived);
  if(!archived.length){el.innerHTML='<div style="text-align:center;padding:2.5rem 0;color:#aaa;font-size:14px;">No archived coffees yet.</div>';return;}
  el.innerHTML=archived.map((c,i)=>archiveCardHtml(c,coffees.indexOf(c))).join('');
}
function archiveCardHtml(c,i){
  const p=PALETTE[coffees.indexOf(c)%PALETTE.length];
  const iconHtml=c.photo?`<img src="${c.photo}" alt="">`:(`<div class="ccard-photo-ph" style="color:`+p.strip+`;">Photo / icon</div>`);
  const brewOpen=!!openBrewIdx['a'+i];
  const brews=c.brewLog||[];
  return `<div class="ccard" style="border-top:3px solid ${p.strip};opacity:0.8;" id="ccard-a-${i}">
    <div class="ccard-inner">
      <div class="ccard-top">
        <div class="ccard-photo-wrap" style="background:${p.bg};">${iconHtml}</div>
        <div class="ccard-right">
          <div class="ccard-info" style="position:relative;">
            <div class="card-top-actions" style="position:absolute;top:.5rem;right:.6rem;">
              <button class="btn-icon" title="Unarchive" onclick="unarchiveCoffee(${i})"><i class="ti ti-archive-off"></i></button>
              <button class="btn-icon danger" title="Delete" onclick="deleteCoffee(${i})"><i class="ti ti-trash"></i></button>
            </div>
            <div class="ccard-name" style="padding-right:62px;">${c.name||'Unnamed coffee'}</div>
            <div class="ccard-sub">${[c.roaster,c.origin].filter(Boolean).join(' · ')||'—'}</div>
            ${[c.process,c.producer].filter(Boolean).length?`<div class="ccard-sub">${[c.process,c.producer].filter(Boolean).join(' · ')}</div>`:''}
            ${c.tasteNotes?`<div class="ccard-taste">${c.tasteNotes}</div>`:''}
            <div class="ccard-badge-row"><span class="badge badge-expired" style="background:#f0f0ee;color:#aaa;">Archived</span></div>
          </div>
          <div class="ccard-dates">
            <div class="date-cell"><div class="date-label">Roasted</div><div class="date-val">${fmtShort(c.roastDate)}</div></div>
            <div class="date-cell"><div class="date-label">Ready</div><div class="date-val">${fmtShort(c.readyDate)}</div></div>
            <div class="date-cell"><div class="date-label">Opened</div><div class="date-val">${fmtShort(c.openDate)}</div></div>
            <div class="date-cell"><div class="date-label">Best-by</div><div class="date-val">${fmtShort(c.bestby)}</div></div>
          </div>
        </div>
      </div>
      <div class="ccard-brew-section">
        <button class="brew-toggle" onclick="toggleArchiveBrew(${i})">
          <span>Brew log${brews.length?' ('+brews.length+')':''}</span>
          <i class="ti ${brewOpen?'ti-chevron-up':'ti-chevron-down'}" style="font-size:13px;"></i>
        </button>
        ${brewOpen?`<div class="brew-body">
          ${brews.length?brews.slice().reverse().map(b=>`
            <div class="brew-entry">
              <div class="brew-entry-header">
                <div style="font-size:12px;font-weight:500;">${[b.filter,b.method].filter(Boolean).join(' · ')||'Brew'}</div>
                <div style="font-size:11px;color:#888;">${fmtFull(b.date)}</div>
              </div>
              <div class="brew-meta-row">
                ${b.temp?`<div class="brew-meta-item">Temp<span>${b.temp}°C</span></div>`:''}
                ${b.tds?`<div class="brew-meta-item">TDS<span>${b.tds}ppm</span></div>`:''}
                ${b.dose?`<div class="brew-meta-item">Dose<span>${b.dose}g</span></div>`:''}
                ${b.grind?`<div class="brew-meta-item">Grind<span>${b.grind}</span></div>`:''}
                ${b.ratio?`<div class="brew-meta-item">Recipe<span>${b.ratio}</span></div>`:''}
              </div>
              ${b.notes?`<div class="brew-notes">${b.notes}</div>`:''}
            </div>`).join(''):'<div style="font-size:13px;color:#aaa;text-align:center;padding:.5rem 0;">No brew entries</div>'}
        </div>`:''}
      </div>
    </div>
  </div>`;
}
async function archiveCoffee(i){
  coffees[i].archived=true;
  try{await dbUpdate(coffees[i].id,{archived:true});toast('Coffee archived.');}
  catch(e){coffees[i].archived=false;toast('Error: '+e.message);}
  render();
}
async function unarchiveCoffee(i){
  coffees[i].archived=false;
  try{await dbUpdate(coffees[i].id,{archived:false});toast('Coffee restored.');}
  catch(e){coffees[i].archived=true;toast('Error: '+e.message);}
  render();renderArchive();
}

function cardHtml(c,i){
  const p=pal(i),status=getStatus(c),prog=restProg(c);
  const barCol=status==='ready'?'#639922':status==='expired'?'#E24B4A':'#EF9F27';
  const badgeCls=status==='ready'?'badge-ready':status==='expired'?'badge-expired':'badge-resting';
  const daysLeft=c.readyDate?Math.max(0,Math.round((new Date(c.readyDate+'T12:00:00')-new Date(today()+'T12:00:00'))/86400000)):0;
  const badgeTxt=status==='ready'?'Ready to brew':status==='expired'?'Past best-by':`Resting · ${daysLeft}d left`;
  const iconHtml=c.photo?`<img src="${c.photo}" alt="">`:(`<div class="ccard-photo-ph" style="color:`+p.strip+`;">Photo / icon</div>`);
  const brewOpen=!!openBrewIdx[i];
  const brews=c.brewLog||[];
  const isEditing=editingIdx===i;
  const isBrewEditing=brewEditIdx===i;

  const brewEntriesHtml=brews.length?brews.map((b,bi)=>{
    const realIdx=brews.length-1-bi;
    const isEditingThis=isBrewEditing&&brewEditEntryIdx===realIdx;
    if(isEditingThis)return brewFormHtml(i,realIdx,b);
    return `<div class="brew-entry">
      <div class="brew-entry-header">
        <div style="font-size:12px;font-weight:500;">${[b.filter,b.method].filter(Boolean).join(' · ')||'Brew'}</div>
        <div style="font-size:11px;color:#888;">${fmtFull(b.date)}</div>
      </div>
      <div class="brew-meta-row">
        ${b.temp?`<div class="brew-meta-item">Temp<span>${b.temp}°C</span></div>`:''}
        ${b.tds?`<div class="brew-meta-item">TDS<span>${b.tds}ppm</span></div>`:''}
        ${b.dose?`<div class="brew-meta-item">Dose<span>${b.dose}g</span></div>`:''}
        ${b.grind?`<div class="brew-meta-item">Grind<span>${b.grind}</span></div>`:''}
        ${b.ratio?`<div class="brew-meta-item">Recipe<span>${b.ratio}</span></div>`:''}
      </div>
      ${b.notes?`<div class="brew-notes">${b.notes}</div>`:''}
      <div class="brew-entry-actions">
        <button class="btn-icon" title="Edit brew" onclick="openBrewEdit(${i},${realIdx})"><i class="ti ti-edit"></i></button>
        <button class="btn-icon danger" title="Delete brew" onclick="deleteBrewEntry(${i},${realIdx})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).reverse().join(''):'<div style="font-size:13px;color:#aaa;text-align:center;padding:.5rem 0;">No brew entries yet</div>';

  return `<div class="ccard" style="border-top:3px solid ${p.strip};" id="ccard-${i}">
    <div class="ccard-inner">
      <div class="ccard-top">
        <div class="ccard-photo-wrap" style="background:${p.bg};">${iconHtml}</div>
        <div class="ccard-right">
          <div class="ccard-info">
            <div class="ccard-name-row">
              <div class="ccard-name">${c.name||'Unnamed coffee'}</div>
              <div class="card-top-actions">
                <button class="btn-icon" title="Archive" onclick="archiveCoffee(${i})"><i class="ti ti-archive"></i></button>
                <button class="btn-icon" title="Edit" onclick="openAddForm(${i})"><i class="ti ti-edit"></i></button>
                <button class="btn-icon danger" title="Delete" onclick="deleteCoffee(${i})"><i class="ti ti-trash"></i></button>
              </div>
            </div>
            <div class="ccard-sub">${[c.roaster,c.origin].filter(Boolean).join(' · ')||'—'}</div>
            ${[c.process,c.producer].filter(Boolean).length?`<div class="ccard-sub">${[c.process,c.producer].filter(Boolean).join(' · ')}</div>`:''}
            ${c.tasteNotes?`<div class="ccard-taste">${c.tasteNotes}</div>`:''}
            <div class="ccard-badge-row"><span class="badge ${badgeCls}">${badgeTxt}</span></div>
            ${c.roastDate&&c.restDays?`<div class="rest-bar"><div class="rest-bar-fill" style="width:${prog}%;background:${barCol};"></div></div>`:''}
          </div>
          <div class="ccard-dates">
            <div class="date-cell"><div class="date-label">Roasted</div><div class="date-val">${fmtShort(c.roastDate)}</div></div>
            <div class="date-cell"><div class="date-label">Ready</div><div class="date-val" style="color:${c.readyDate?'#3B6D11':'#aaa'};">${fmtShort(c.readyDate)}</div></div>
            <div class="date-cell"><div class="date-label">Opened</div><div class="date-val">${fmtShort(c.openDate)}</div></div>
            <div class="date-cell"><div class="date-label">Best-by</div><div class="date-val" style="color:${c.bestby&&today()>c.bestby?'#A32D2D':'#1a1a1a'};">${fmtShort(c.bestby)}</div></div>
          </div>
        </div>
      </div>
      <div class="ccard-brew-section">
        <button class="brew-toggle" onclick="toggleBrew(${i})">
          <span>Brew log${brews.length?' ('+brews.length+')':''}</span>
          <i class="ti ${brewOpen||isBrewEditing?'ti-chevron-up':'ti-chevron-down'}" style="font-size:13px;"></i>
        </button>
        ${(brewOpen||isBrewEditing)?`<div class="brew-body">
          ${brewEntriesHtml}
          ${isBrewEditing&&brewEditEntryIdx===null?brewFormHtml(i,null,null):`<button class="brew-add-btn" onclick="openBrewForm(${i})" style="margin-top:8px;"><i class="ti ti-plus"></i> Add brew entry</button>`}
        </div>`:''}
      </div>
      ${isEditing?`<div class="inline-modal">${editFormHtml(c)}</div>`:''}
    </div>
  </div>`;
}

  <div class="modal-tabs">
    <button class="modal-tab active" onclick="showFTab('details',this)">Details</button>

      <div class="ff"><label>Producer</label><input type="text" id="f-producer" value="${c.producer||''}" placeholder="Ninety Plus"></div>

      <div class="ff dates-full"><label>Roast date</label><input type="date" id="f-roast" value="${c.roastDate||''}" oninput="autoReady()"></div>
      <div class="ff dates-full"><label>Rest days needed</label><input type="number" id="f-rest" value="${c.restDays||''}" placeholder="e.g. 10" min="0" oninput="autoReady()"></div>
      <div class="ff full"><label>Ready date <span style="font-weight:400;color:#aaa;">(auto)</span></label><input type="date" id="f-ready" value="${c.readyDate||''}" readonly></div>

        <input type="date" id="f-open" value="${c.openDate||''}" oninput="autoBestBy()">
      </div>
      <div class="ff full"><label>Best-by <span style="font-weight:400;color:#aaa;">(auto: open + 14 days)</span></label><input type="date" id="f-bestby" value="${c.bestby||''}" readonly></div>

  <div class="modal-actions">

    <button class="btn-primary" onclick="saveCoffee()">Save coffee</button>

}

  return `<div class="brew-entry" style="border:0.5px solid #85B7EB;background:#f8fbff;">
    <div style="font-size:13px;font-weight:500;margin-bottom:.75rem;">${isEdit?'Edit brew entry':'New brew entry'}</div>

      <div class="ff brew-full"><label>Date</label><input type="date" id="b-date" value="${b.date||today()}"></div>
      <div class="ff brew-full"><label>Method</label>
        <select id="b-method"><option value="">Select...</option>${['Espresso','Filter / pour over','French press','AeroPress','Moka pot','Cold brew','Other'].map(m=>`<option ${b.method===m?'selected':''}>${m}</option>`).join('')}</select>
      </div>
      <div class="ff brew-full"><label>Filter</label>
        <select id="b-filter" onchange="toggleFilterOther()"><option value="">Select...</option>${['V60','Neo','Switch','Torch','Other'].map(f=>`<option ${b.filter===f?'selected':''}>${f}</option>`).join('')}</select>
      </div>
      <div class="ff brew-full" id="b-filter-other-wrap" style="display:${b.filter&&!['V60','Neo','Switch','Torch'].includes(b.filter)&&b.filter!==''?'flex':'none'};flex-direction:column;gap:4px;">
        <label>Specify filter</label><input type="text" id="b-filter-other" value="${b.filter&&!['V60','Neo','Switch','Torch'].includes(b.filter)?b.filter:''}" placeholder="e.g. Origami">

function toggleFilterOther(){const v=document.getElementById('b-filter').value;document.getElementById('b-filter-other-wrap').style.display=v==='Other'?'flex':'none';}
function showFTab(tab,btn){
  document.getElementById('ftab-details').style.display=tab==='details'?'':'none';
  document.getElementById('ftab-dates').style.display=tab==='dates'?'':'none';
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
}
function autoReady(){const r=document.getElementById('f-roast').value;const d=document.getElementById('f-rest').value;document.getElementById('f-ready').value=addDays(r,d);}
function autoBestBy(){const o=document.getElementById('f-open').value;document.getElementById('f-bestby').value=addDays(o,14);}
function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{photoDataUrl=ev.target.result;const prev=document.getElementById('ph-prev');if(prev){prev.src=photoDataUrl;prev.style.display='block';}};
  reader.readAsDataURL(file);
}
function openAddForm(idx){
  editingIdx=idx==='new'?'new':idx;brewEditIdx=null;brewEditEntryIdx=null;
  photoDataUrl=editingIdx!=='new'?coffees[editingIdx].photo||null:null;
  renderList();
  setTimeout(()=>{const target=editingIdx==='new'?document.querySelector('.coffee-list .ccard'):document.getElementById('ccard-'+editingIdx);if(target)target.scrollIntoView({behavior:'smooth',block:'nearest'});},50);
}
function closeEdit(){editingIdx=null;photoDataUrl=null;renderList();}

async function saveCoffee(){
  const name=(document.getElementById('f-name').value||'').trim();
  if(!name){alert('Please enter a coffee name.');return;}
  const isNew=editingIdx==='new';
  const existing=!isNew?coffees[editingIdx]:{};
  const c={...existing,name,
    roaster:(document.getElementById('f-roaster').value||'').trim(),
    origin:(document.getElementById('f-origin').value||'').trim(),
    process:(document.getElementById('f-process').value||'').trim(),
    producer:(document.getElementById('f-producer').value||'').trim(),
    tasteNotes:(document.getElementById('f-taste').value||'').trim(),
    roastDate:document.getElementById('f-roast').value||'',
    restDays:document.getElementById('f-rest').value||'',
    readyDate:document.getElementById('f-ready').value||'',
    openDate:document.getElementById('f-open').value||'',
    bestby:document.getElementById('f-bestby').value||'',
    photo:photoDataUrl||existing.photo||null,
    brewLog:existing.brewLog||[],
  };
  try{
    if(isNew){const row=await dbInsert(toDB(c));coffees.unshift(fromDB(row));}
    else{const row=await dbUpdate(existing.id,toDB(c));coffees[editingIdx]=fromDB(row);}
    toast(isNew?'Coffee added!':'Coffee updated!');
  }catch(e){toast('Error saving: '+e.message);console.error(e);}
  editingIdx=null;photoDataUrl=null;render();
}

async function deleteCoffee(i){
  if(!confirm('Remove this coffee?'))return;
  try{await dbDelete(coffees[i].id);coffees.splice(i,1);toast('Coffee removed.');render();}
  catch(e){toast('Error deleting: '+e.message);}
}

function toggleBrew(i){openBrewIdx[i]=!openBrewIdx[i];brewEditIdx=null;brewEditEntryIdx=null;renderList();}
function toggleArchiveBrew(i){openBrewIdx['a'+i]=!openBrewIdx['a'+i];renderArchive();}
function openBrewForm(i){brewEditIdx=i;brewEditEntryIdx=null;openBrewIdx[i]=true;renderList();setTimeout(()=>{const c=document.getElementById('ccard-'+i);if(c)c.scrollIntoView({behavior:'smooth',block:'nearest'});},50);}
function openBrewEdit(coffeeIdx,entryIdx){brewEditIdx=coffeeIdx;brewEditEntryIdx=entryIdx;openBrewIdx[coffeeIdx]=true;renderList();setTimeout(()=>{const c=document.getElementById('ccard-'+coffeeIdx);if(c)c.scrollIntoView({behavior:'smooth',block:'nearest'});},50);}
function cancelBrewForm(i){brewEditIdx=null;brewEditEntryIdx=null;renderList();}

function getBrewEntry(){
  const filterVal=document.getElementById('b-filter').value;
  const filterOther=document.getElementById('b-filter-other')?document.getElementById('b-filter-other').value:'';
  return{date:document.getElementById('b-date').value,method:document.getElementById('b-method').value,filter:filterVal==='Other'?filterOther||'Other':filterVal,temp:document.getElementById('b-temp').value,tds:document.getElementById('b-tds').value,dose:document.getElementById('b-dose').value,ratio:document.getElementById('b-ratio').value,grind:document.getElementById('b-grind').value,notes:document.getElementById('b-notes').value.trim()};
}

async function saveBrewEntry(i){
  const entry=getBrewEntry();
  if(!coffees[i].brewLog)coffees[i].brewLog=[];
  coffees[i].brewLog.push(entry);
  try{await dbUpdate(coffees[i].id,{brew_log:coffees[i].brewLog});toast('Brew entry saved!');}
  catch(e){toast('Error saving brew: '+e.message);coffees[i].brewLog.pop();}
  openBrewIdx[i]=true;brewEditIdx=null;brewEditEntryIdx=null;render();
}

async function saveBrewEdit(coffeeIdx,entryIdx){
  const entry=getBrewEntry();
  const prev=coffees[coffeeIdx].brewLog[entryIdx];
  coffees[coffeeIdx].brewLog[entryIdx]=entry;
  try{await dbUpdate(coffees[coffeeIdx].id,{brew_log:coffees[coffeeIdx].brewLog});toast('Brew entry updated!');}
  catch(e){toast('Error updating brew: '+e.message);coffees[coffeeIdx].brewLog[entryIdx]=prev;}
  openBrewIdx[coffeeIdx]=true;brewEditIdx=null;brewEditEntryIdx=null;render();
}

async function deleteBrewEntry(coffeeIdx,entryIdx){
  if(!confirm('Delete this brew entry?'))return;
  const removed=coffees[coffeeIdx].brewLog.splice(entryIdx,1);
  try{await dbUpdate(coffees[coffeeIdx].id,{brew_log:coffees[coffeeIdx].brewLog});toast('Brew entry deleted.');}
  catch(e){toast('Error deleting brew: '+e.message);coffees[coffeeIdx].brewLog.splice(entryIdx,0,...removed);}
  openBrewIdx[coffeeIdx]=true;render();
}

function renderCalendar(){
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-label').textContent=MONTHS[calMonth]+' '+calYear;
  const grid=document.getElementById('cal-grid');
  const dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const t=today(),firstDay=new Date(calYear,calMonth,1).getDay(),dim=new Date(calYear,calMonth+1,0).getDate(),diPrev=new Date(calYear,calMonth,0).getDate();
  const stripMap={},labelMap={};
  // Store full event data for popup
  window._calEvents={};
  coffees.filter(c=>!c.archived).forEach((c,i)=>{
    const p=pal(coffees.indexOf(c));
    const label=[c.roaster,c.name].filter(Boolean).join(' · ')||'Coffee '+(i+1);
    if(c.roastDate&&c.readyDate){
      let cur=c.roastDate;
      while(cur<c.readyDate){
        if(!stripMap[cur])stripMap[cur]=[];
        stripMap[cur].push(p.strip);
        if(!window._calEvents[cur])window._calEvents[cur]=[];
        window._calEvents[cur].push({color:p.strip,label,type:'resting',coffee:c});
        const d=new Date(cur+'T12:00:00');d.setDate(d.getDate()+1);cur=d.toISOString().split('T')[0];
      }
    }
    [{ds:c.readyDate,lbl:'Ready to brew'},{ds:c.openDate,lbl:'Opened'},{ds:c.bestby,lbl:'Best-by'}].forEach(({ds,lbl})=>{
      if(ds){
        if(!labelMap[ds])labelMap[ds]=[];
        labelMap[ds].push({color:p.strip,label:label+' · '+lbl});
        if(!window._calEvents[ds])window._calEvents[ds]=[];
        window._calEvents[ds].push({color:p.strip,label,type:lbl,coffee:c});
      }
    });
  });
  let cells=[];
  for(let i=0;i<firstDay;i++)cells.push({day:diPrev-firstDay+1+i,thisMonth:false,ds:null});
  for(let d=1;d<=dim;d++){const mm=String(calMonth+1).padStart(2,'0'),dd=String(d).padStart(2,'0');cells.push({day:d,thisMonth:true,ds:`${calYear}-${mm}-${dd}`});}
  let nx=1;while(cells.length%7!==0)cells.push({day:nx++,thisMonth:false,ds:null});
  html+=cells.map(cell=>{
    const strips=cell.ds?(stripMap[cell.ds]||[]):[];
    const hasEvents=cell.ds&&(strips.length||(labelMap[cell.ds]||[]).length);
    const isToday=cell.ds===t;
    const cls=['cal-day',!cell.thisMonth?'other-month':'',isToday?'today':'',hasEvents?'has-events':'',hasEvents?'cal-clickable':''].filter(Boolean).join(' ');
    const stripsHtml=[...new Set(strips)].map(col=>`<div class="cal-strip" style="background:${col}55;"></div>`).join('');
    // Show dot indicators only (no text) — click for full detail
    const dots=(labelMap[cell.ds]||[]).map(l=>`<div class="cal-dot" style="background:${l.color};display:inline-block;margin-right:2px;"></div>`).join('');
    const dotsHtml=dots?`<div style="margin-top:3px;">${dots}</div>`:'';
    const onclick=hasEvents?`onclick="showCalPopup('${cell.ds}')" `:'';
    return `<div class="${cls}" ${onclick}><div class="cal-day-num">${cell.day}</div>${stripsHtml}${dotsHtml}</div>`;
  }).join('');
  grid.innerHTML=html;
  const leg=document.getElementById('cal-legend');
  leg.innerHTML=coffees.filter(c=>!c.archived).map((c,i)=>{const p=pal(coffees.indexOf(c));const label=[c.roaster,c.name].filter(Boolean).join(' · ')||'Coffee '+(i+1);return`<div class="cal-legend-item"><div style="width:12px;height:12px;border-radius:2px;background:${p.strip};"></div><span>${label}</span></div>`;}).join('')+(coffees.filter(c=>!c.archived).length?`<div class="cal-legend-item" style="margin-left:auto;"><div style="width:18px;height:4px;background:#B4B2A9;opacity:.5;border-radius:2px;"></div> Resting</div>`:'');
}

function showCalPopup(ds){
  const events=window._calEvents[ds]||[];
  if(!events.length)return;
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const d=new Date(ds+'T12:00:00');
  const dateLabel=d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
  // Group: key dates first, then resting
  const keyEvents=events.filter(e=>e.type!=='resting');
  const restingEvents=events.filter(e=>e.type==='resting');
  // Deduplicate resting by coffee name
  const seenResting=new Set();
  const uniqueResting=restingEvents.filter(e=>{if(seenResting.has(e.label))return false;seenResting.add(e.label);return true;});
  let inner='';
  if(keyEvents.length){
    inner+=keyEvents.map(e=>`
      <div style="display:flex;align-items:center;gap:10px;padding:.6rem 0;border-bottom:0.5px solid #e5e5e3;">
        <div style="width:10px;height:10px;border-radius:50%;background:${e.color};flex-shrink:0;"></div>
        <div>
          <div style="font-size:13px;font-weight:500;">${e.label}</div>
          <div style="font-size:12px;color:#888;margin-top:1px;">${e.type}</div>
        </div>
      </div>`).join('');
  }
  if(uniqueResting.length){
    inner+=`<div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.05em;padding:.6rem 0 .3rem;">Resting</div>`;
    inner+=uniqueResting.map(e=>`
      <div style="display:flex;align-items:center;gap:10px;padding:.4rem 0;">
        <div style="width:10px;height:10px;border-radius:3px;background:${e.color}66;flex-shrink:0;"></div>
        <div style="font-size:13px;color:#555;">${e.label}</div>
      </div>`).join('');
  }
  document.getElementById('cal-popup').innerHTML=`
    <div style="position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;display:flex;align-items:center;justify-content:center;" onclick="closeCalPopup(event)">
      <div style="background:#fff;border-radius:12px;padding:1.25rem;width:340px;max-width:92vw;max-height:80vh;overflow-y:auto;" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.85rem;">
          <div style="font-size:15px;font-weight:500;">${dateLabel}</div>
          <button onclick="closeCalPopup()" style="background:transparent;border:none;font-size:18px;cursor:pointer;color:#aaa;line-height:1;">×</button>
        </div>
        ${inner}
      </div>
    </div>`;
}
function closeCalPopup(e){
  if(!e||e.target===document.querySelector('#cal-popup>div'))
  document.getElementById('cal-popup').innerHTML='';
}
function changeMonth(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function render(){renderStats();renderList();if(document.getElementById('view-calendar').style.display!=='none')renderCalendar();if(document.getElementById('view-archive').style.display!=='none')renderArchive();}

async function autoArchivePastBestBy(){
  const toArchive=coffees.filter(c=>!c.archived&&c.bestby&&today()>c.bestby);
  for(const c of toArchive){
    c.archived=true;
    try{await dbUpdate(c.id,{archived:true});}catch(e){c.archived=false;}
  }
  if(toArchive.length){toast(toArchive.length+' coffee'+(toArchive.length>1?'s':'')+' auto-archived (past best-by).');}
}

async function init(){
  try{const rows=await dbGet();coffees=rows.map(fromDB);await autoArchivePastBestBy();render();}
  catch(e){document.getElementById('coffee-list').innerHTML='<div style="text-align:center;padding:2rem;color:#A32D2D;font-size:14px;">Could not connect to database. Check your internet connection.</div>';console.error(e);}
}
init();
</script>
</body>
</html>
